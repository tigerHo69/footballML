<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Match Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; }
        .selection-card {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            padding: 3rem;
        }
        select { border-radius: 10px !important; padding: 12px !important; }
        .btn-simulate {
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mb-4 text-center">
            <a href="/" class="text-decoration-none text-muted"><i class="bi bi-house-door"></i> Back to Dashboard</a>
        </div>
        
        <div class="card selection-card">
            <div class="text-center mb-5">
                <i class="bi bi-lightning-charge-fill text-primary fs-1"></i>
                <h2 class="fw-bold mt-3">Custom Head-to-Head</h2>
                <p class="text-muted">Select two teams to simulate a match based on their current ML-calculated form.</p>
            </div>

            <form action="/custom-match" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold text-uppercase small text-muted">Home Team</label>
                    <select class="form-select form-select-lg" name="home_team" required>
                        <option value="" disabled selected>Select Home Team</option>
                        {% for team in teams %}
                        <option value="{{ team }}">{{ team }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="text-center my-4 py-2">
                    <span class="badge bg-light text-muted border px-3 py-2">VS</span>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-bold text-uppercase small text-muted">Away Team</label>
                    <select class="form-select form-select-lg" name="away_team" required>
                        <option value="" disabled selected>Select Away Team</option>
                        {% for team in teams %}
                        <option value="{{ team }}">{{ team }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-simulate w-100 shadow">
                    Launch Simulation <i class="bi bi-play-circle-fill ms-2"></i>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
